let current = 0;

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = questions.map((q, i) =>
    `<button onclick="goTo(${i})" id="nav-${i}" class="${i === 0 ? 'active' : ''}">${q.q}</button>`
  ).join('');
}

function renderCards() {
  const container = document.getElementById('cards');
  container.innerHTML = questions.map((q, i) => {
    let sectionsHtml = '';
    q.sections.forEach(section => {
      if (section.label) {
        sectionsHtml += `<div class="section-label">${section.label}</div>`;
      }
      sectionsHtml += '<ul>' + section.items.map(item =>
        `<li>${item}</li>`
      ).join('') + '</ul>';
    });
    const highlightHtml = q.highlight
      ? `<div class="highlight"><strong>↳</strong> ${q.highlight}</div>`
      : '';
    return `
      <div class="card ${i === 0 ? 'visible' : ''}" id="card-${i}">
        <div class="card-header">
          <span class="q-badge">${q.q}</span>
          <h2>${q.title}</h2>
        </div>
        ${sectionsHtml}
        ${highlightHtml}
      </div>
    `;
  }).join('');
}

function goTo(index) {
  document.getElementById(`card-${current}`).classList.remove('visible');
  document.getElementById(`nav-${current}`).classList.remove('active');
  current = index;
  document.getElementById(`card-${current}`).classList.add('visible');
  document.getElementById(`nav-${current}`).classList.add('active');
  document.getElementById('counter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === questions.length - 1;
  window.scrollTo(0, 0);
}

function navigate(dir) {
  goTo(current + dir);
}

renderNav();
renderCards();
</script>
