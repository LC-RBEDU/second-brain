const ST_CLASS  = {ns:"st-ns", ip:"st-ip", wt:"st-wt", dn:"st-dn"};
const PRIOS = ["ASAP","Next","Backlog"];
const PILL_CLASS = {ASAP:"asap-pill", Next:"next-pill", Backlog:"backlog-pill"};
const TAB_AP = {all:"active-all", ASAP:"active-asap", Next:"active-next", Backlog:"active-backlog"};
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let curP = "all", curS = "all", expanded = {};

function ice(t){ return t.ice.i * t.ice.c * t.ice.e; }

function fmtDl(dl){
  if(!dl) return '';
  const d = new Date(dl); d.setHours(0,0,0,0);
  const s = d.getDate() + '. ' + d.toLocaleString('cs',{month:'short'}) + '.';
  return `<span class="${d < TODAY ? 'dl-past':'dl-future'}">${d < TODAY ? '⚠ ':''}${s}</span>`;
}

function setPFilter(f,btn){
  curP=f;
  document.querySelectorAll('.ftab').forEach(b=>b.className='ftab');
  btn.className='ftab '+TAB_AP[f];
  render();
}
function setSFilter(f,btn){
  curS=f;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('s-active'));
  btn.classList.add('s-active');
  render();
}
function toggleTask(id){
  expanded[id]=!expanded[id];
  const cl=document.getElementById('cl-'+id);
  const ti=document.getElementById('ti-'+id);
  if(cl) cl.className='checklist'+(expanded[id]?' open':'');
  if(ti) ti.className='toggle-icon'+(expanded[id]?' open':'');
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  let tot={ASAP:0,Next:0,Backlog:0};
  TASKS.forEach(t=>tot[t.p]++);
  document.getElementById('cnt-asap').textContent=tot.ASAP;
  document.getElementById('cnt-next').textContent=tot.Next;
  document.getElementById('cnt-bl').textContent=tot.Backlog;

  (curP==='all'?PRIOS:[curP]).forEach(prio=>{
    const tasks=TASKS
      .filter(t=>t.p===prio)
      .filter(t=>curS==='all'||t.st===curS)
      .sort((a,b)=>ice(b)-ice(a));
    if(!tasks.length) return;

    const sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML=`<div class="sec-header">
      <span class="sec-pill ${PILL_CLASS[prio]}">${prio}</span>
      <span class="sec-count">${tasks.length} úkolů</span>
      <div class="sec-line"></div>
    </div>`;

    tasks.forEach(t=>{
      const proj=PROJ[t.proj]||{label:t.proj,acc:"acc-gr"};
      const score=ice(t);
      const isDone=t.st==='dn';
      const card=document.createElement('div');
      card.className='task'+(isDone?' is-done':'');

      let chHtml=`<div class="checklist${expanded[t.id]?' open':''}" id="cl-${t.id}">`;
      if(t.related) chHtml+=`<div class="related-note">${t.related}</div>`;
      if(t.ch&&t.ch.length){
        t.ch.forEach(c=>{
          chHtml+=`<div class="ch-item">
            <div class="ch-box${c.d?' done':''}">${c.d?'✓':''}</div>
            <span class="${c.d?'ch-done':''}">${c.t}</span>
          </div>`;
        });
      } else if(!t.related){
        chHtml+=`<div class="no-ch">Bez checklistu</div>`;
      }
      chHtml+='</div>';

      card.innerHTML=`
        <div class="task-main" onclick="toggleTask('${t.id}')">
          <div class="task-body">
            <div class="task-name-row">
              <span class="task-name${isDone?' done-text':''}">${t.name}</span>
              ${fmtDl(t.dl)}
            </div>
            <div class="task-meta-row">
              <span class="task-id">${t.id}</span>
              <span class="meta-sep">·</span>
              <span class="status ${ST_CLASS[t.st]}">${ST_LABEL[t.st]}</span>
              <span class="meta-sep">·</span>
              <div class="ice-subtle">
                <span class="ice-subtle-score">ice ${score}</span>
                <div class="ice-subtle-parts">
                  <div class="ice-p"><span>i</span><span>${t.ice.i}</span></div>
                  <div class="ice-p"><span>c</span><span>${t.ice.c}</span></div>
                  <div class="ice-p"><span>e</span><span>${t.ice.e}</span></div>
                </div>
              </div>
              <span class="meta-sep">·</span>
              <span class="proj-badge ${proj.acc}">${proj.label}</span>
            </div>
          </div>
          <div class="toggle-icon${expanded[t.id]?' open':''}" id="ti-${t.id}">▾</div>
        </div>
        ${chHtml}
      `;
      sec.appendChild(card);
    });
    board.appendChild(sec);
  });
}

render();
</script>
</body>
</html>
