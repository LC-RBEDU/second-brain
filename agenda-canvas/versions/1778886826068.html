<script>
const FILE_ID = '1f2BjEKFpwhJEuYaG9f0h-mXIg_VIDf6b';
let TASKS = [], PROJECTS = {}, PROJ_ORDER = [], META = {};

// AB button — injected after load for projects that need it
const AB = '<button style="background:none;border:none;color:#185FA5;font-size:12px;cursor:pointer;padding:0" onclick="sendPrompt(\'Otevři artefakt Procesní inventář finance\')">📋 Procesní inventář finance</button>';
const AB_PROJECTS = ['firemni-procesy','financni-tym'];

// ── DEADLINE UTILS ────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function dlDiff(dl) {
  if (!dl) return null;
  const d = new Date(dl); d.setHours(0,0,0,0);
  return Math.round((d - TODAY) / 86400000);
}
function dlUrgency(dl) {
  const diff = dlDiff(dl);
  if (diff === null) return null;
  if (diff < 0) return 'past';
  if (diff <= 3) return 'hot';
  if (diff <= 7) return 'warn';
  return 'future';
}
function fmtDl(dl) {
  if (!dl) return '';
  const d = new Date(dl); d.setHours(0,0,0,0);
  const s = d.getDate() + '. ' + d.toLocaleString('cs',{month:'short'}) + '.';
  const u = dlUrgency(dl);
  const cls = u==='future'?'dl-future':u==='warn'?'dl-warn':u==='hot'?'dl-hot':'dl-past';
  const icon = u==='past'?'⚠ ':u==='hot'?'🔥 ':u==='warn'?'⚡ ':'';
  return `<span class="${cls}">${icon}${s}</span>`;
}
function fmtChDl(dl) {
  if (!dl) return '';
  const d = new Date(dl); d.setHours(0,0,0,0);
  const s = d.getDate() + '. ' + d.toLocaleString('cs',{month:'short'}) + '.';
  const u = dlUrgency(dl);
  const cls = u==='future'?'dl-future':u==='warn'?'dl-warn':u==='hot'?'dl-hot':'dl-past';
  const icon = u==='past'?'⚠':u==='hot'?'🔥':u==='warn'?'⚡':'·';
  return `<span class="ch-dl ${cls}">${icon} ${s}</span>`;
}

// Returns the nearest active deadline for a project (for Canvas card)
function nearestDl(key) {
  const tasks = TASKS.filter(t => t.proj===key && t.st!=='dn' && t.p!=='Backlog' && t.dl);
  if (!tasks.length) return null;
  tasks.sort((a,b) => new Date(a.dl) - new Date(b.dl));
  return tasks[0].dl;
}

// ── LINKIFY ────────────────────────────────────────────────
function linkify(text) {
  const m = text.match(/^(↗\s*)(.+?):\s*(https?:\/\/.+)$/);
  if (m) return `${m[1]}<a href="${m[3].trim()}" target="_blank" style="color:#185FA5;text-decoration:underline;font-weight:500">${m[2]}</a>`;
  return text.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:#185FA5;text-decoration:underline">$1</a>');
}

// ── UTILS ─────────────────────────────────────────────────
const ice = t => t.ice.i * t.ice.c * t.ice.e;
const qc = q => q==="ASAP"?"asap":q==="Next"?"next":"bl";
const PILL = {ASAP:"asap-pill",Next:"next-pill",Backlog:"bl-pill"};
const ST_LBL = {ns:"Not started",ip:"In progress",wt:"Waiting",dn:"Done"};
const ST_CLS  = {ns:"st-ns",ip:"st-ip",wt:"st-wt",dn:"st-dn"};

// ── DATA LOAD ─────────────────────────────────────────────
async function loadData() {
  try {
    const result = await window.cowork.callMcpTool(
      'mcp__b6cb3d09-6578-4906-90ec-862974e792ce__download_file_content',
      { fileId: FILE_ID }
    );
    const jsonStr = atob(result.content);
    const data = JSON.parse(jsonStr);
    TASKS = data.tasks;
    PROJECTS = data.projects;
    PROJ_ORDER = data.proj_order;
    META = { version: data.version, updated: data.updated };

    // Inject AB button into materials for relevant projects (empty strings were placeholders)
    AB_PROJECTS.forEach(k => {
      if (PROJECTS[k]) {
        PROJECTS[k].materials = (PROJECTS[k].materials || [])
          .filter(m => m !== '' && m !== null)
          .concat([AB]);
      }
    });
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#C0392B;padding:20px">Chyba načítání: ${e.message}</div>`;
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('canvas-note').textContent = META.updated ? 'Triáž: ' + META.updated : '';
  document.getElementById('triage-date').textContent = META.updated ? 'Triáž: ' + META.updated : '';
  renderCanvas();
  renderTaskList();
}

// ── VIEW SWITCHER ──────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll('.sw-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+v).classList.add('active');
  document.getElementById('view-'+v).classList.add('active');
}

// ══════════════════════════════════════════════════════════
//  CANVAS VIEW
// ══════════════════════════════════════════════════════════
const activeTasks = key => TASKS.filter(t=>t.proj===key && t.st!=='dn' && t.p!=='Backlog');
const blTasks     = key => TASKS.filter(t=>t.proj===key && t.st!=='dn' && t.p==='Backlog');
const doneTasks   = key => TASKS.filter(t=>t.proj===key && t.st==='dn');

function buildBadges(key) {
  const at=activeTasks(key), bt=blTasks(key);
  const asapN=at.filter(t=>t.p==='ASAP').length, nextN=at.filter(t=>t.p==='Next').length, blN=bt.length;
  const out=[];
  if(asapN) out.push(`<span class="b asap">${asapN}× ASAP</span>`);
  if(nextN) out.push(`<span class="b next">${nextN}× Next</span>`);
  if(blN)   out.push(`<span class="b bl">${blN} backlog</span>`);
  if(!out.length) out.push(`<span class="b bl">sledované</span>`);
  return out.join('');
}

function topTask(key) {
  const at=activeTasks(key);
  if(!at.length){ const p=PROJECTS[key]; return p.watch&&p.watch[0] ? p.watch[0] : 'Žádné aktivní úkoly'; }
  const t=(at.filter(x=>x.p==='ASAP')[0])||at[0];
  return t.name+(t.p==='ASAP'?' 🔥':'');
}

function cardDlBadge(key) {
  const dl = nearestDl(key);
  if (!dl) return '';
  const u = dlUrgency(dl);
  const d = new Date(dl); d.setHours(0,0,0,0);
  const s = d.getDate() + '. ' + d.toLocaleString('cs',{month:'short'}) + '.';
  const icon = u==='past'?'⚠':u==='hot'?'🔥':u==='warn'?'⚡':'';
  const cls = 'card-dl card-dl-'+u;
  return `<span class="${cls}">${icon} ${s}</span>`;
}

function renderCanvas() {
  const active=PROJ_ORDER.filter(k=>activeTasks(k).length>0);
  const passive=PROJ_ORDER.filter(k=>!activeTasks(k).length);
  let tot=0; PROJ_ORDER.forEach(k=>tot+=activeTasks(k).length);
  document.getElementById('cv-active').textContent=active.length;
  document.getElementById('cv-tasks').textContent=tot;

  document.getElementById('ag').innerHTML=active.map(k=>{
    const p=PROJECTS[k], at=activeTasks(k), bt=blTasks(k);
    const dlBadge = cardDlBadge(k);
    return `<div class="card" onclick="showProject('${k}')">
      <div class="acc acc-${p.acc}"></div>
      <div class="cn">${p.name}</div><div class="cs">${k}</div>
      <div class="bdg">${buildBadges(k)}</div>
      <div class="ct">${topTask(k)}</div>
      <div class="cf">
        <div class="cc"><b>${at.length}</b> aktivní · <b>${bt.length}</b> backlog</div>
        ${dlBadge ? `<div>${dlBadge}</div>` : '<span style="color:#ccc;font-size:12px">→</span>'}
      </div>
    </div>`;
  }).join('');

  document.getElementById('pg').innerHTML=passive.map(k=>{
    const p=PROJECTS[k];
    return `<div class="pc" onclick="showProject('${k}')">
      <div class="pn">${p.name}</div><div class="ps">${k}</div>
      <div class="pi">${topTask(k)}</div>
    </div>`;
  }).join('');
}

function showProject(key) {
  const p=PROJECTS[key], at=activeTasks(key), bt=blTasks(key), dt=doneTasks(key);
  let h=`<div class="dh"><div><div class="dn">${p.name}</div><div class="ds">${key}</div></div><div class="bdg">${buildBadges(key)}</div></div>`;

  if(at.length){
    h+=`<div class="blk"><div class="blt">Aktivní úkoly</div>`;
    at.forEach(t=>{
      const dlBadge = t.dl ? `<span style="margin-left:6px">${fmtDl(t.dl)}</span>` : '';
      h+=`<div class="tk"><div class="tl2">
        <div class="tid">${t.id}${dlBadge}</div>
        <div class="tnm">${t.name}</div>`;
      if(t.ch&&t.ch.length) {
        h+=`<div class="tch">${t.ch.map((c,i)=>`<div class="ch">
          <div class="cb${c.d?' d':''}">${c.d?'✓':''}</div>
          <span class="ch-num">${i+1}.</span>
          <span class="${c.d?'cd':''}">${linkify(c.t)}${c.dl&&!c.d?fmtChDl(c.dl):''}</span>
        </div>`).join('')}</div>`;
      }
      h+=`</div><span class="tb b ${qc(t.p)}">${t.p}</span></div>`;
    });
    h+=`</div>`;
  }

  if(bt.length){
    h+=`<div class="blk"><div class="blt">Backlog</div>`;
    bt.forEach(t=>{
      let bch='';
      if(t.ch&&t.ch.length) bch=`<div class="tch">${t.ch.map((c,i)=>`<div class="ch"><div class="cb${c.d?' d':''}">${c.d?'✓':''}</div><span class="ch-num">${i+1}.</span><span class="${c.d?'cd':''}">${linkify(c.t)}</span></div>`).join('')}</div>`;
      h+=`<div class="bi"><span class="bid">${t.id}</span><b>${t.name}</b>${bch}</div>`;
    });
    h+=`</div>`;
  }

  if(p.watch&&p.watch.length){
    h+=`<div class="blk"><div class="blt">Otevřené otázky</div>`;
    p.watch.forEach(w=>{ h+=`<div class="wi">${w}</div>`; });
    h+=`</div>`;
  }

  if(p.materials&&p.materials.length){
    const mats = p.materials.filter(m=>m&&m.trim()!=='');
    if(mats.length){
      h+=`<div class="blk"><div class="blt">Materiály</div>`;
      mats.forEach(m=>{ h+=`<div class="mi">${m}</div>`; });
      h+=`</div>`;
    }
  }

  const allDone=[...(p.done||[])];
  dt.forEach(t=>{ if(!allDone.some(d=>d.includes(t.id))) allDone.push(`${t.id} — ${t.name} ✅`); });
  if(allDone.length){
    h+=`<div class="blk"><div class="blt">Hotovo</div>`;
    allDone.forEach(d=>{ h+=`<div class="di"><span>✓</span>${d}</div>`; });
    h+=`</div>`;
  }

  document.getElementById('dc').innerHTML=h;
  document.getElementById('vc').style.display='none';
  document.getElementById('vd').style.display='block';
  window.scrollTo(0,0);
}

function backToCanvas(){
  document.getElementById('vd').style.display='none';
  document.getElementById('vc').style.display='block';
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════════════════
//  TASK LIST VIEW
// ══════════════════════════════════════════════════════════
let curP='all', curS='all', curSort='ice', expanded={};

function setPFilter(f,btn){
  curP=f;
  document.querySelectorAll('.ftab').forEach(b=>b.className='ftab');
  btn.classList.add(f==='all'?'fa':f==='ASAP'?'fa-asap':f==='Next'?'fa-next':'fa-bl');
  renderTaskList();
}
function setSFilter(f,btn){
  curS=f;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('sa'));
  btn.classList.add('sa');
  renderTaskList();
}
function setSort(s,btn){
  curSort=s;
  document.querySelectorAll('.srtab').forEach(b=>b.className='srtab');
  btn.classList.add(s==='dl'?'sr-a':'sr-i');
  renderTaskList();
}
function toggleTask(id){
  expanded[id]=!expanded[id];
  const cl=document.getElementById('cl-'+id), ti=document.getElementById('ti-'+id);
  if(cl) cl.className='checklist'+(expanded[id]?' open':'');
  if(ti) ti.className='toggle-icon'+(expanded[id]?' open':'');
}

function sortByDl(tasks) {
  // Past deadlines first (by date asc), then nearest future, then no deadline
  return [...tasks].sort((a,b)=>{
    const da = a.dl ? new Date(a.dl) : null;
    const db = b.dl ? new Date(b.dl) : null;
    const ua = dlUrgency(a.dl), ub = dlUrgency(b.dl);
    // past always first
    if(ua==='past' && ub!=='past') return -1;
    if(ub==='past' && ua!=='past') return 1;
    // both have deadline → sort by date
    if(da && db) return da - db;
    // deadline before no-deadline
    if(da && !db) return -1;
    if(!da && db) return 1;
    // fallback: ICE
    return ice(b) - ice(a);
  });
}

function renderTaskList(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const tot={ASAP:0,Next:0,Backlog:0};
  TASKS.forEach(t=>{ if(tot[t.p]!==undefined) tot[t.p]++; });
  document.getElementById('cnt-asap').textContent=tot.ASAP;
  document.getElementById('cnt-next').textContent=tot.Next;
  document.getElementById('cnt-bl').textContent=tot.Backlog;

  if(curSort==='dl'){
    // Flat sort by deadline, ignoring priority grouping
    let tasks = TASKS.filter(t=>curP==='all'||t.p===curP).filter(t=>curS==='all'||t.st===curS);
    tasks = sortByDl(tasks);
    if(!tasks.length) return;
    const sec=document.createElement('div'); sec.className='section';
    sec.innerHTML=`<div class="sec-header"><span class="sec-pill dl-pill">📅 Deadline</span><span class="sec-count">${tasks.length} úkolů</span><div class="sec-line"></div></div>`;
    tasks.forEach(t=>{ sec.appendChild(buildTaskCard(t)); });
    board.appendChild(sec);
  } else {
    // Default: group by priority, sort by ICE
    (curP==='all'?['ASAP','Next','Backlog']:[curP]).forEach(prio=>{
      const tasks=TASKS.filter(t=>t.p===prio).filter(t=>curS==='all'||t.st===curS).sort((a,b)=>ice(b)-ice(a));
      if(!tasks.length) return;
      const sec=document.createElement('div'); sec.className='section';
      sec.innerHTML=`<div class="sec-header"><span class="sec-pill ${PILL[prio]}">${prio}</span><span class="sec-count">${tasks.length} úkolů</span><div class="sec-line"></div></div>`;
      tasks.forEach(t=>{ sec.appendChild(buildTaskCard(t)); });
      board.appendChild(sec);
    });
  }
}

function buildTaskCard(t){
  const proj=PROJECTS[t.proj]||{name:t.proj,acc:"gr"};
  const isDone=t.st==='dn';
  const card=document.createElement('div'); card.className='task'+(isDone?' is-done':'');

  let cl=`<div class="checklist${expanded[t.id]?' open':''}" id="cl-${t.id}">`;
  if(t.related) cl+=`<div style="font-size:11px;color:#888;padding:5px 0 2px;font-style:italic">${t.related}</div>`;
  if(t.ch&&t.ch.length){
    t.ch.forEach((c,i)=>{
      const chDl = (c.dl && !c.d) ? fmtChDl(c.dl) : '';
      cl+=`<div class="ch-item">
        <div class="ch-box${c.d?' done':''}">${c.d?'✓':''}</div>
        <span class="ch-num">${i+1}.</span>
        <span class="${c.d?'ch-done':''}">${linkify(c.t)}${chDl}</span>
      </div>`;
    });
  } else if(!t.related) cl+=`<div class="no-ch">Bez checklistu</div>`;
  cl+='</div>';

  card.innerHTML=`<div class="task-main" onclick="toggleTask('${t.id}')">
    <div class="task-body">
      <div class="task-name-row">
        <span class="task-name${isDone?' done-text':''}">${t.name}</span>
        ${fmtDl(t.dl)}
      </div>
      <div class="task-meta-row">
        <span class="task-id">${t.id}</span><span class="meta-sep">·</span>
        <span class="status ${ST_CLS[t.st]}">${ST_LBL[t.st]}</span><span class="meta-sep">·</span>
        <div class="ice-subtle"><span class="ice-s">ice ${ice(t)}</span><span style="color:#ccc">(${t.ice.i}×${t.ice.c}×${t.ice.e})</span></div>
        <span class="meta-sep">·</span>
        <span class="proj-badge pb-${proj.acc}">${proj.name}</span>
      </div>
    </div>
    <div class="toggle-icon${expanded[t.id]?' open':''}" id="ti-${t.id}">▾</div>
  </div>${cl}`;

  return card;
}
