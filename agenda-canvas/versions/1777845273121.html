  if(q==="Q2") return "bq2";
  if(q==="Q3"||q==="Q4") return "bgray";
  return "bgray";
}

function renderCanvas(){
  const ag=document.getElementById("active-grid");
  ag.innerHTML=ACTIVE.map(p=>`
    <div class="card" onclick="showDetail('${p.id}')">
      <div class="card-accent ${p.accent}"></div>
      <div class="card-name">${p.name}</div>
      <div class="card-slug">${p.id}</div>
      <div class="badges">${badgeHtml(p.badges)}</div>
      <div class="card-task">${p.topTask}</div>
      <div class="card-footer">
        <div class="counts"><b>${p.activeCount}</b> aktivní · <b>${p.backlogCount}</b> backlog</div>
        <span class="card-arrow">→</span>
      </div>
    </div>`).join("");

  const pg=document.getElementById("passive-grid");
  pg.innerHTML=PASSIVE.map(p=>`
    <div class="pcard" onclick="showDetail('${p.id}')">
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-slug">${p.id}</div>
      <div class="pcard-item">${p.topTask}</div>
    </div>`).join("");
}

function renderDetail(p){
  let html=`
    <div class="detail-header">
      <div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-slug">${p.id}</div>
      </div>
      <div class="detail-badges">${badgeHtml(p.badges)}</div>
    </div>`;

  if(p.active.length){
    html+=`<div class="block"><div class="block-title">Aktivní úkoly</div>`;
    p.active.forEach(t=>{
      html+=`<div class="task">
        <div class="task-left">
          <div class="task-id">${t.id}</div>
          <div class="task-name">${t.name}</div>
          ${t.desc?`<div class="task-desc">${t.desc}</div>`:""}
          ${t.checks.length?`<div class="task-checks">${t.checks.map(c=>`<div class="check"><div class="check-box"></div><span>${c}</span></div>`).join("")}</div>`:""}
          ${t.ice?`<div class="ice">ICE ${t.ice}</div>`:""}
        </div>
        <span class="task-badge badge ${qBadgeClass(t.q)}">${t.q}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if(p.backlog.length){
    html+=`<div class="block"><div class="block-title">Backlog</div>`;
    p.backlog.forEach(b=>{
      html+=`<div class="backlog-item">
        <span class="backlog-id">${b.id}</span>
        <b>${b.name}</b>
        ${b.q&&b.q!=="backlog"?` <span class="badge ${qBadgeClass(b.q)}" style="font-size:9px;padding:1px 5px">${b.q}</span>`:""}
        ${b.note?`<br><span style="color:#aaa">${b.note}</span>`:""}
      </div>`;
    });
    html+=`</div>`;
  }

  if(p.watch&&p.watch.length){
    html+=`<div class="block"><div class="block-title">Otevřené otázky / watch</div>`;
    p.watch.forEach(w=>{ html+=`<div class="watch-item">${w}</div>`; });
    html+=`</div>`;
  }

  if(p.materials&&p.materials.length){
    html+=`<div class="block"><div class="block-title">Materiály</div>`;
    p.materials.forEach(m=>{ html+=`<div class="material-item">${m}</div>`; });
    html+=`</div>`;
  }

  if(p.done&&p.done.length){
    html+=`<div class="block"><div class="block-title">Hotovo</div>`;
    p.done.forEach(d=>{ html+=`<div class="done-item"><span class="done-check">✓</span><span style="color:#0F6E56">${d}</span></div>`; });
    html+=`</div>`;
  }

  return html;
}

function showDetail(id){
  const p=PROJECTS.find(x=>x.id===id);
  if(!p)return;
  document.getElementById("detail-content").innerHTML=renderDetail(p);
  document.getElementById("view-canvas").classList.remove("active");
  document.getElementById("view-detail").classList.add("active");
  window.scrollTo(0,0);
}

function showCanvas(){
  document.getElementById("view-detail").classList.remove("active");
  document.getElementById("view-canvas").classList.add("active");
  window.scrollTo(0,0);
}

renderCanvas();
</script>
</body>
</html>
