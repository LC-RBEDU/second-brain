    });
    h+=`</div>`;
  }
  if(p.bl&&p.bl.length){
    h+=`<div class="blk"><div class="blt">Backlog</div>`;
    p.bl.forEach(b=>{h+=`<div class="bi"><span class="bid">${b.id}</span><b>${b.name}</b>${b.q?` <span class="b ${qc(b.q)}" style="font-size:9px;padding:1px 5px">${b.q}</span>`:""}</div>`;});
    h+=`</div>`;
  }
  if(p.w&&p.w.length){
    h+=`<div class="blk"><div class="blt">Otevřené otázky</div>`;
    p.w.forEach(w=>{h+=`<div class="wi">${w}</div>`;});
    h+=`</div>`;
  }
  if(p.m&&p.m.length){
    h+=`<div class="blk"><div class="blt">Materiály</div>`;
    p.m.forEach(m=>{h+=`<div class="mi">${m}</div>`;});
    h+=`</div>`;
  }
  if(p.done&&p.done.length){
    h+=`<div class="blk"><div class="blt">Hotovo</div>`;
    p.done.forEach(d=>{h+=`<div class="di"><span style="color:#1D9E75">✓</span>${d}</div>`;});
    h+=`</div>`;
  }
  document.getElementById("dc").innerHTML=h;
  document.getElementById("vc").classList.remove("active");
  document.getElementById("vd").classList.add("active");
  window.scrollTo(0,0);
}
function sc(){
  document.getElementById("vd").classList.remove("active");
  document.getElementById("vc").classList.add("active");
  window.scrollTo(0,0);
}
</script>
</body>
