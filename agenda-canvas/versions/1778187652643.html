function tkHtml(t){
  const dlH = fmtDl(t.dl);
  const stH = t.st ? `<span class="status ${ST_CLASS[t.st]}">${ST_LABEL[t.st]}</span>` : '';
  const icH = iceHtml(t.ice);
  const hasMeta = stH||icH||dlH;
  let ch='';
  if(t.ch&&t.ch.length){
    ch=`<div class="tch">${t.ch.map(c=>`<div class="ch"><div class="cb${c.d?' d':''}">${c.d?'✓':''}</div><span class="${c.d?'cd':''}">${c.t}</span></div>`).join('')}</div>`;
  }
  return `<div class="tk">
    <div class="tk-top">
      <div class="tl2">
        <div class="tnm">${t.name}${dlH?' '+dlH:''}</div>
        ${hasMeta?`<div class="tm-row">
          <span class="tid">${t.id}</span>
          ${stH?`<span class="msep">·</span>${stH}`:''}
          ${icH?`<span class="msep">·</span>${icH}`:''}
        </div>`:`<div class="tm-row"><span class="tid">${t.id}</span></div>`}
        ${ch}
      </div>
      <span class="tb b ${qc(t.q)}">${t.q}</span>
    </div>
  </div>`;
}

function sd(k){
  const p=D[k];
  let h=`<div class="dh"><div><div class="dn">${p.name}</div><div class="ds">${k}</div></div><div class="bdg">${bh(p.badges)}</div></div>`;
  if(p.active.length){
    h+=`<div class="blk"><div class="blt">Aktivní úkoly</div>`;
    p.active.forEach(t=>{ h+=tkHtml(t); });
    h+=`</div>`;
  }
  if(p.bl&&p.bl.length){
    h+=`<div class="blk"><div class="blt">Backlog</div>`;
    p.bl.forEach(b=>{
      const icH=iceHtml(b.ice);
      h+=`<div class="bi"><span class="bid">${b.id}</span><b>${b.name}</b>${b.q?` <span class="b ${qc(b.q)}" style="font-size:9px;padding:1px 5px">${b.q}</span>`:''}${icH?' <span class="msep">·</span> '+icH:''}</div>`;
    });
    h+=`</div>`;
  }
  if(p.w&&p.w.length){
    h+=`<div class="blk"><div class="blt">Otevřené otázky</div>`;
    p.w.forEach(w=>{h+=`<div class="wi">${w}</div>`;});
    h+=`</div>`;
  }
  if(p.m&&p.m.length){
    h+=`<div class="blk"><div class="blt">Materiály</div>`;
    p.m.forEach(m=>{h+=`<div class="mi">${m}</div>`;});
    h+=`</div>`;
  }
  if(p.done&&p.done.length){
    h+=`<div class="blk"><div class="blt">Hotovo</div>`;
    p.done.forEach(d=>{h+=`<div class="di"><span style="color:#1D9E75">✓</span>${d}</div>`;});
    h+=`</div>`;
  }
  document.getElementById("dc").innerHTML=h;
  document.getElementById("vc").classList.remove("active");
  document.getElementById("vd").classList.add("active");
  window.scrollTo(0,0);
}
